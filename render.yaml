services:
  - type: web
    name: neuro-api
    env: python
    # O comando de build instala as dependências do requirements.txt e o próprio pacote local da API
    buildCommand: "pip install -r requirements.txt && pip install -e ."
    # O Render injeta automaticamente a variável de ambiente $PORT
    startCommand: "uvicorn neuro_api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
